name: 🤖 Playhood Android — Build & Distribute

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ Fix: Install exact NDK version matching your project
      - name: 🔧 Setup Android NDK 27.1.12297006
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.1.12297006" \
            "cmake;3.22.1" \
            "build-tools;35.0.0" \
            "platforms;android-35"

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: 🔑 Grant Gradlew Permission
        run: chmod +x android/gradlew

      - name: 🔐 Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/playhood-release.keystore

      - name: 🔨 Build Release APK
        working-directory: android
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.1.12297006
        run: |
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=app/playhood-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 📤 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: playhood-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: 🔥 Distribute to Firebase
        if: github.event_name == 'push'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: qa-team
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: "Playhood Build #${{ github.run_number }} — ${{ github.event.head_commit.message }}"